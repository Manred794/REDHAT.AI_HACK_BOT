<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 REDHAT Admin | Live Analytics</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCyCou5S6OzcklXi405mvHyclhEdqKkwuU",
            authDomain: "bynex-ai.firebaseapp.com",
            projectId: "bynex-ai",
            storageBucket: "bynex-ai.firebasestorage.app",
            messagingSenderId: "114344299762",
            appId: "1:114344299762:web:d9720a7d60ecc9a0bd146b",
            measurementId: "G-FFYFGQCRSZ"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    </script>
    
    <style>
        :root {
            --primary: #0d6efd;
            --success: #198754;
            --warning: #ffc107;
            --danger: #dc3545;
            --dark: #212529;
            --gray: #6c757d;
            --light: #f8f9fa;
            --border: #e9ecef;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        
        body {
            background: linear-gradient(135deg, #f0f2f5 0%, #e9ecef 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Login Box */
        .login-box {
            background: white;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        
        .login-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary), #6f42c1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: white;
            font-size: 1.5rem;
        }
        
        .login-box h2 { margin-bottom: 10px; color: var(--dark); }
        .login-box p { color: var(--gray); margin-bottom: 25px; font-size: 0.95rem; }
        
        .login-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            margin-bottom: 15px;
        }
        
        .login-input:focus { outline: none; border-color: var(--primary); }
        
        .login-btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        
        .login-btn:hover { background: #0b5ed7; }
        
        .error-msg { color: var(--danger); margin-top: 12px; font-size: 0.9rem; display: none; }
        
        /* Dashboard */
        .dashboard { display: none; width: 100%; max-width: 1100px; }
        
        .dash-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 24px;
            background: white;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        
        .dash-header h1 { font-size: 1.4rem; display: flex; align-items: center; gap: 10px; }
        .dash-header h1 i { color: var(--primary); }
        
        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.95rem;
        }
        
        .btn-success { background: var(--success); color: white; }
        .btn-success:hover { background: #157347; }
        
        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { background: #b02a37; }
        
        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
        }
        
        .stat-card .label { color: var(--gray); font-size: 0.9rem; margin-bottom: 8px; }
        .stat-card .value { font-size: 2rem; font-weight: 700; color: var(--primary); }
        .stat-card.success .value { color: var(--success); }
        .stat-card.warning .value { color: var(--warning); }
        
        /* Charts */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .chart-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        
        .chart-card h3 { margin-bottom: 15px; font-size: 1.1rem; display: flex; align-items: center; gap: 8px; }
        .chart-card h3 i { color: var(--primary); }
        .chart-container { position: relative; height: 220px; }
        
        /* Activity Log */
        .log-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        
        .log-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .log-header h3 { font-size: 1.1rem; display: flex; align-items: center; gap: 8px; }
        
        .log-header select {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: white;
        }
        
        .log-list { max-height: 350px; overflow-y: auto; }
        
        .log-item {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            font-size: 0.95rem;
        }
        
        .log-item:last-child { border-bottom: none; }
        
        .log-item .event {
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
        }
        
        .log-item .event.join { background: rgba(25,135,84,0.15); color: var(--success); }
        .log-item .event.bot { background: rgba(13,110,253,0.15); color: var(--primary); }
        .log-item .event.support { background: rgba(255,193,7,0.15); color: #856404; }
        .log-item .event.page { background: rgba(108,117,125,0.15); color: var(--gray); }
        
        .log-item .time { color: var(--gray); font-size: 0.85rem; }
        .log-empty { padding: 30px; text-align: center; color: var(--gray); }
        
        @media (max-width: 768px) {
            .dash-header { flex-direction: column; gap: 15px; text-align: center; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .charts-grid { grid-template-columns: 1fr; }
        }
        
        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- Login -->
    <div class="login-box" id="loginBox">
        <div class="login-icon"><i class="fas fa-shield-alt"></i></div>
        <h2>Admin Access</h2>
        <p>Enter password to view analytics</p>
        <input type="password" class="login-input" id="passwordInput" placeholder="Enter password">
        <button class="login-btn" id="unlockBtn">Unlock Dashboard</button>
        <p class="error-msg" id="errorMsg">❌ Wrong password</p>
    </div>

    <!-- Dashboard -->
    <div class="dashboard" id="dashboardBox">
        <div class="dash-header">
            <h1><i class="fas fa-chart-line"></i> REDHAT Analytics</h1>
            <div style="display:flex;gap:10px">
                <button class="btn btn-success" id="exportBtn"><i class="fas fa-download"></i> Export</button>
                <button class="btn btn-danger" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><div class="label">Page Views</div><div class="value" id="statViews">0</div></div>
            <div class="stat-card success"><div class="label">Telegram Joins</div><div class="value" id="statJoins">0</div></div>
            <div class="stat-card"><div class="label">Bot Clicks</div><div class="value" id="statBot">0</div></div>
            <div class="stat-card warning"><div class="label">Support</div><div class="value" id="statSupport">0</div></div>
        </div>

        <div class="charts-grid">
            <div class="chart-card">
                <h3><i class="fas fa-chart-bar"></i> Timeline</h3>
                <div class="chart-container"><canvas id="chart1"></canvas></div>
            </div>
            <div class="chart-card">
                <h3><i class="fas fa-chart-pie"></i> Distribution</h3>
                <div class="chart-container"><canvas id="chart2"></canvas></div>
            </div>
        </div>

        <div class="log-card">
            <div class="log-header">
                <h3><i class="fas fa-list"></i> Activity Feed</h3>
                <select id="filterSelect">
                    <option value="all">All</option>
                    <option value="JoinChannel">Joins</option>
                    <option value="TryBot">Bot</option>
                    <option value="ContactSupport">Support</option>
                    <option value="PageView">Views</option>
                </select>
            </div>
            <div class="log-list" id="logList"><div class="log-empty">Loading...</div></div>
        </div>
    </div>

    <script>
        // Config
        const ADMIN_PASS = "REDHAT2024!";
        const SESSION_KEY = "redhat_admin_session";
        
        // State
        let db = null;
        let unsubscribe = null;
        let chart1 = null;
        let chart2 = null;
        let eventsData = [];

        // DOM Elements
        const loginBox = document.getElementById('loginBox');
        const dashboardBox = document.getElementById('dashboardBox');
        const passwordInput = document.getElementById('passwordInput');
        const unlockBtn = document.getElementById('unlockBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const exportBtn = document.getElementById('exportBtn');
        const errorMsg = document.getElementById('errorMsg');
        const filterSelect = document.getElementById('filterSelect');
        const logList = document.getElementById('logList');

        // Check session on load
        function checkSession() {
            if (sessionStorage.getItem(SESSION_KEY) === 'true') {
                showDashboard();
            }
        }

        // Show Dashboard
        function showDashboard() {
            loginBox.style.display = 'none';
            dashboardBox.style.display = 'block';
            initDashboard();
        }

        // Show Login
        function showLogin() {
            loginBox.style.display = 'block';
            dashboardBox.style.display = 'none';
            passwordInput.value = '';
            errorMsg.style.display = 'none';
        }

        // Login
        function doLogin() {
            if (passwordInput.value === ADMIN_PASS) {
                sessionStorage.setItem(SESSION_KEY, 'true');
                showDashboard();
            } else {
                errorMsg.style.display = 'block';
            }
        }

        // Logout
        function doLogout() {
            sessionStorage.removeItem(SESSION_KEY);
            if (unsubscribe) unsubscribe();
            showLogin();
        }

        // Init Dashboard
        function initDashboard() {
            db = firebase.firestore();
            initCharts();
            loadData();
        }

        // Init Charts
        function initCharts() {
            const ctx1 = document.getElementById('chart1').getContext('2d');
            chart1 = new Chart(ctx1, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Events',
                        data: [],
                        borderColor: '#0d6efd',
                        backgroundColor: 'rgba(13,110,253,0.1)',
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
                }
            });

            const ctx2 = document.getElementById('chart2').getContext('2d');
            chart2 = new Chart(ctx2, {
                type: 'doughnut',
                data: {
                    labels: ['Views', 'Joins', 'Bot', 'Support'],
                    datasets: [{
                        data: [0, 0, 0, 0],
                        backgroundColor: ['#6c757d', '#198754', '#0d6efd', '#ffc107'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom' } }
                }
            });
        }

        // Load Data
        function loadData() {
            unsubscribe = db.collection('events')
                .orderBy('timestamp', 'desc')
                .limit(100)
                .onSnapshot(snapshot => {
                    eventsData = [];
                    const counts = { PageView: 0, JoinChannel: 0, TryBot: 0, ContactSupport: 0 };
                    const buckets = {};

                    snapshot.forEach(doc => {
                        const e = { id: doc.id, ...doc.data() };
                        eventsData.push(e);
                        if (counts[e.type] !== undefined) counts[e.type]++;
                        if (e.timestamp) {
                            const d = e.timestamp.toDate();
                            const key = d.toLocaleDateString() + ' ' + d.getHours() + ':00';
                            buckets[key] = (buckets[key] || 0) + 1;
                        }
                    });

                    // Update stats
                    document.getElementById('statViews').textContent = counts.PageView.toLocaleString();
                    document.getElementById('statJoins').textContent = counts.JoinChannel.toLocaleString();
                    document.getElementById('statBot').textContent = counts.TryBot.toLocaleString();
                    document.getElementById('statSupport').textContent = counts.ContactSupport.toLocaleString();

                    // Update charts
                    updateCharts(buckets, counts);

                    // Update log
                    renderLog();
                }, error => {
                    console.error('Error:', error);
                    logList.innerHTML = '<div class="log-empty" style="color:#dc3545">❌ Error loading data</div>';
                });
        }

        // Update Charts
        function updateCharts(buckets, counts) {
            if (!chart1 || !chart2) return;
            const times = Object.keys(buckets).sort().slice(-12);
            chart1.data.labels = times;
            chart1.data.datasets[0].data = times.map(t => buckets[t]);
            chart1.update();
            chart2.data.datasets[0].data = [counts.PageView, counts.JoinChannel, counts.TryBot, counts.ContactSupport];
            chart2.update();
        }

        // Render Log
        function renderLog() {
            const filter = filterSelect.value;
            const data = filter === 'all' ? eventsData : eventsData.filter(e => e.type === filter);

            if (!data.length) {
                logList.innerHTML = '<div class="log-empty">No events yet</div>';
                return;
            }

            logList.innerHTML = data.slice(0, 50).map(e => {
                const time = e.timestamp ? new Date(e.timestamp.toDate()).toLocaleString() : 'Now';
                const cls = e.type === 'JoinChannel' ? 'join' : e.type === 'TryBot' ? 'bot' : e.type === 'ContactSupport' ? 'support' : 'page';
                return '<div class="log-item">' +
                    '<div><span class="event ' + cls + '">' + e.type + '</span> <span style="color:#6c757d;font-size:0.85rem">' + (e.label || '') + '</span></div>' +
                    '<span class="time">' + time + '</span>' +
                    '</div>';
            }).join('');
        }

        // Export CSV
        function exportCSV() {
            if (!eventsData.length) return alert('No data');
            const rows = [['Timestamp','Type','Label','Platform','Session'], ...eventsData.map(e => [e.timestamp?.toDate().toISOString()||'', e.type, e.label||'', e.platform||'', e.sessionId||''])];
            const csv = rows.map(r => r.map(c => '"'+c+'"').join(',')).join('\n');
            const blob = new Blob([csv], {type:'text/csv'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'redhat-' + new Date().toISOString().split('T')[0] + '.csv';
            a.click();
            URL.revokeObjectURL(url);
        }

        // Event Listeners
        unlockBtn.addEventListener('click', doLogin);
        logoutBtn.addEventListener('click', doLogout);
        exportBtn.addEventListener('click', exportCSV);
        filterSelect.addEventListener('change', renderLog);
        passwordInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') doLogin();
        });

        // Init on load
        checkSession();
    </script>
</body>
</html>
