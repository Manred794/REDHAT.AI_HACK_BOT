<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 REDHAT Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script>
        // ✅ Firebase Config - Web App (SAFE)
        const firebaseConfig = {
            apiKey: "AIzaSyCyCou5S6OzcklXi405mvHyclhEdqKkwuU",
            authDomain: "bynex-ai.firebaseapp.com",
            projectId: "bynex-ai",
            storageBucket: "bynex-ai.firebasestorage.app",
            messagingSenderId: "114344299762",
            appId: "1:114344299762:web:d9720a7d60ecc9a0bd146b",
            measurementId: "G-FFYFGQCRSZ"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; }
        body { background: #f0f2f5; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .auth { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .auth h2 { margin-bottom: 15px; color: #212529; }
        .auth input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
        .auth button { width: 100%; padding: 12px; background: #0d6efd; color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: 600; cursor: pointer; }
        .auth button:hover { background: #0b5ed7; }
        .err { color: #dc3545; margin-top: 10px; display: none; }
        .dash { display: none; width: 100%; max-width: 1000px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: white; border-radius: 12px; margin-bottom: 20px; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat { background: white; padding: 15px; border-radius: 10px; text-align: center; }
        .stat .val { font-size: 1.8rem; font-weight: 700; color: #0d6efd; margin: 5px 0; }
        .log { background: white; border-radius: 12px; padding: 15px; max-height: 400px; overflow-y: auto; }
        .log-item { padding: 10px; border-bottom: 1px solid #eee; font-size: 0.9rem; display: flex; justify-content: space-between; }
        .log-item:last-child { border-bottom: none; }
        .logout { background: #dc3545; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>
    <!-- 🔐 Login -->
    <div class="auth" id="authBox">
        <h2><i class="fas fa-lock"></i> Admin Login</h2>
        <input type="password" id="passInput" placeholder="Enter password">
        <button id="unlockBtn">Unlock</button>
        <p class="err" id="errMsg">❌ Wrong password</p>
    </div>

    <!-- 📊 Dashboard -->
    <div class="dash" id="dashBox">
        <div class="header">
            <h2><i class="fas fa-chart-line"></i> REDHAT Analytics</h2>
            <button class="logout" id="logoutBtn">Logout</button>
        </div>
        <div class="stats">
            <div class="stat"><div>Views</div><div class="val" id="cntView">0</div></div>
            <div class="stat"><div>Joins</div><div class="val" id="cntJoin">0</div></div>
            <div class="stat"><div>Bot</div><div class="val" id="cntBot">0</div></div>
            <div class="stat"><div>Support</div><div class="val" id="cntSup">0</div></div>
        </div>
        <div class="log" id="logBox"><div style="text-align:center;color:#6c757d;padding:20px;">Loading events...</div></div>
    </div>

    <script>
        // 🔐 Config
        const PASS = "REDHAT2024!"; // ⚠️ CHANGE THIS
        
        // ✅ DOM Elements
        const authBox = document.getElementById('authBox');
        const dashBox = document.getElementById('dashBox');
        const passInput = document.getElementById('passInput');
        const unlockBtn = document.getElementById('unlockBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const errMsg = document.getElementById('errMsg');
        const logBox = document.getElementById('logBox');

        // ✅ Login Function
        function handleLogin() {
            if (passInput.value === PASS) {
                authBox.style.display = 'none';
                dashBox.style.display = 'block';
                loadAnalytics();
            } else {
                errMsg.style.display = 'block';
            }
        }

        // ✅ Logout Function
        function handleLogout() {
            dashBox.style.display = 'none';
            authBox.style.display = 'block';
            passInput.value = '';
            errMsg.style.display = 'none';
        }

        // ✅ Load Analytics from Firebase
        function loadAnalytics() {
            const db = firebase.firestore();
            
            db.collection('events').orderBy('timestamp', 'desc').limit(50).onSnapshot(snapshot => {
                const counts = { PageView: 0, JoinChannel: 0, TryBot: 0, ContactSupport: 0 };
                let html = '';
                
                snapshot.forEach(doc => {
                    const e = doc.data();
                    if (counts[e.type] !== undefined) counts[e.type]++;
                    
                    const time = e.timestamp ? new Date(e.timestamp.toDate()).toLocaleTimeString() : 'Now';
                    html += '<div class="log-item"><span>' + e.type + ' - ' + (e.label||'') + '</span><span style="color:#6c757d">' + time + '</span></div>';
                });
                
                // Update stats
                document.getElementById('cntView').textContent = counts.PageView;
                document.getElementById('cntJoin').textContent = counts.JoinChannel;
                document.getElementById('cntBot').textContent = counts.TryBot;
                document.getElementById('cntSup').textContent = counts.ContactSupport;
                
                // Update log
                logBox.innerHTML = html || '<div style="text-align:center;color:#6c757d;padding:20px;">No events yet</div>';
            }, error => {
                console.error('Error:', error);
                logBox.innerHTML = '<div style="color:#dc3545;padding:20px;">❌ Error loading data</div>';
            });
        }

        // ✅ Attach Event Listeners (DOM ready)
        document.addEventListener('DOMContentLoaded', function() {
            unlockBtn.addEventListener('click', handleLogin);
            logoutBtn.addEventListener('click', handleLogout);
            passInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') handleLogin();
            });
        });
    </script>
</body>
</html>
