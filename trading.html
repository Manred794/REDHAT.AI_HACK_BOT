      // --- META PIXEL TRACKING FRAMEWORK ---
      let loggedEvents = [];
      let eventListeners = [];

      const notifyListeners = () => {
        eventListeners.forEach(l => l());
      };

      const subscribeToPixelEvents = (listener) => {
        eventListeners.push(listener);
        return () => {
          eventListeners = eventListeners.filter(l => l !== listener);
        };
      };

      const getLoggedEvents = () => loggedEvents;

      const getTestEventCode = () => {
        if (typeof window === "undefined") return undefined;
        const params = new URLSearchParams(window.location.search);
        let code = params.get("test_event_code") || params.get("_fb_test_code") || params.get("test") || undefined;
        
        if (code) {
          sessionStorage.setItem("test_event_code", code);
        } else {
          code = sessionStorage.getItem("test_event_code") || sessionStorage.getItem("fb_test_event_code") || "TEST319";
        }
        return code;
      };

      const setTestEventCode = (code) => {
        if (typeof window === "undefined") return;
        if (code) {
          const trimmed = code.trim();
          sessionStorage.setItem("test_event_code", trimmed);
          const params = new URLSearchParams(window.location.search);
          params.set("test_event_code", trimmed);
          const newUrl = `${window.location.pathname}?${params.toString()}`;
          window.history.replaceState({ path: newUrl }, "", newUrl);
        } else {
          sessionStorage.removeItem("test_event_code");
          const params = new URLSearchParams(window.location.search);
          params.delete("test_event_code");
          params.delete("_fb_test_code");
          params.delete("test");
          const searchString = params.toString();
          const newUrl = `${window.location.pathname}${searchString ? "?" + searchString : ""}`;
          window.history.replaceState({ path: newUrl }, "", newUrl);
        }
        notifyListeners();
      };

      const addLoggedPixelEvent = (name, params = {}, isCustom = false) => {
        const newEvent = {
          id: Math.random().toString(36).substring(2, 9),
          timestamp: new Date().toLocaleTimeString(),
          name,
          params,
          isCustom,
          testCodeUsed: getTestEventCode(),
        };
        loggedEvents = [newEvent, ...loggedEvents].slice(0, 50);
        notifyListeners();
      };

      const trackPixelEvent = (eventName, params = {}) => {
        if (typeof window !== "undefined") {
          if (typeof window.fbq !== "undefined") {
            const testCode = getTestEventCode();
            const options = testCode ? { test_event_code: testCode } : undefined;
            
            window.fbq("track", eventName, params, options);
            console.log(`[Pixel] Fired event: ${eventName}`, params, options);
            addLoggedPixelEvent(eventName, params, false);
          } else {
            console.warn(`[Pixel] fbq SDK is not initialized/loaded yet. Buffering event: ${eventName}`, params);
            addLoggedPixelEvent(eventName, { ...params, _warning: "Buffered (SDK not initialized)" }, false);
          }
        }

      // --- PIXEL DEBUGGER COMPONENT ---
      function PixelDebugger() {
        const [isOpen, setIsOpen] = useState(false);
        const [testCodeInput, setTestCodeInput] = useState(getTestEventCode() || "");
        const [events, setEvents] = useState([]);
        const [copied, setCopied] = useState(false);
        const [fbqStatus, setFbqStatus] = useState("loading");
        const [expandedEventId, setExpandedEventId] = useState(null);

        useEffect(() => {
          setEvents(getLoggedEvents());
          const unsubscribe = subscribeToPixelEvents(() => {
            setEvents(getLoggedEvents());
            setTestCodeInput(getTestEventCode() || "");
          });

          const interval = setInterval(() => {
            if (typeof window !== "undefined" && typeof window.fbq !== "undefined" && window.fbq.loaded) {
              setFbqStatus("ready");
              clearInterval(interval);
            }
          }, 500);

          const timeout = setTimeout(() => {
            if (typeof window !== "undefined" && (typeof window.fbq === "undefined" || !window.fbq.loaded)) {
              setFbqStatus("failed");
            }
          }, 12000);

          return () => {
            unsubscribe();
            clearInterval(interval);
            clearTimeout(timeout);
          };
        }, []);

        const handleApply = (e) => {
          e.preventDefault();
          if (testCodeInput.trim()) {
            setTestEventCode(testCodeInput.trim());
          } else {
            setTestEventCode(undefined);
          }
        };

        const handleClear = () => {
          setTestCodeInput("");
          setTestEventCode(undefined);
        };

        const copyTestUrl = () => {
          if (typeof window === "undefined") return;
          const currentCode = getTestEventCode();
          const url = new URL(window.location.href);
          if (currentCode) {
            url.searchParams.set("test_event_code", currentCode);
          } else {
            url.searchParams.delete("test_event_code");
          }
          
          navigator.clipboard.writeText(url.toString()).then(() => {
            setCopied(true);
            setTimeout(() => setCopied(false), 2000);
          });
        };

        if (!isOpen) {
          return (
            <div className="fixed bottom-4 left-4 z-50 font-sans text-white select-none">
              <motion.button
                whileHover={{ scale: 1.05 }}
                whileTap={{ scale: 0.95 }}
                onClick={() => setIsOpen(true)}
                className="h-11 px-4 flex items-center gap-2.5 rounded-full bg-[#161a2b]/95 border border-white/10 shadow-xl text-xs font-bold cursor-pointer relative group overflow-hidden"
                id="btn-pixel-debugger-trigger"
              >
                <span className={`w-2 h-2 rounded-full ${fbqStatus === "ready" ? "bg-green-500 animate-pulse" : "bg-amber-500 animate-pulse"}`} />
                <span className="text-gray-200">Meta Pixel Helper</span>
                {getTestEventCode() ? (
                  <span className="bg-brand-primary/20 text-brand-primary px-2 py-0.5 rounded-full text-[9px] font-black tracking-wide border border-brand-primary/20">
                    {getTestEventCode()}
                  </span>
                ) : (
                  <span className="text-[9px] text-gray-500 font-normal">Offline Test</span>
                )}
              </motion.button>
            </div>
          );
        }

        return (
          <div className="fixed bottom-4 left-4 z-50 font-sans text-white select-none">
            <motion.div
              initial={{ opacity: 0, y: 30, scale: 0.92 }}
              animate={{ opacity: 1, y: 0, scale: 1 }}
              className="w-[340px] md:w-[360px] bg-[#0c0f1d]/95 backdrop-blur-2xl border border-white/10 rounded-2xl shadow-stone-950/80 shadow-2xl overflow-hidden flex flex-col max-h-[460px]"
            >
              <div className="bg-white/5 border-b border-white/10 px-4 py-3 flex items-center justify-between">
                <div className="flex items-center gap-2.5">
                  <div className="p-1 rounded bg-brand-primary/10">
                    <Icons.Activity size={16} className="text-brand-primary" />
                  </div>
                  <div className="text-left">
                    <h3 className="font-extrabold text-[11px] uppercase tracking-widest text-white">Meta Pixel Logs</h3>
                    <div className="flex items-center gap-1.5 mt-0.5">
                      <span className={`w-1.5 h-1.5 rounded-full ${fbqStatus === "ready" ? "bg-green-500" : "bg-amber-400"}`} />
                      <span className="text-[9px] text-gray-400 font-bold uppercase tracking-wider">
                        {fbqStatus === "ready" ? "Integrations Online" : "Loading Tracker SDK..."}
                      </span>
                    </div>
                  </div>
                </div>
                <button 
                  onClick={() => setIsOpen(false)}
                  className="text-gray-400 hover:text-white text-[10px] font-bold uppercase py-1 px-2.5 hover:bg-white/5 rounded-lg transition-all cursor-pointer bg-transparent border-none"
                >
                  Minimize
                </button>
              </div>

              <div className="flex-1 overflow-y-auto p-4 space-y-4 no-scrollbar">
                <div className="bg-white/5 border border-white/5 rounded-xl p-3 text-left">
                  <div className="flex items-center justify-between mb-2">
                    <div className="flex items-center gap-1.5">
                      <Icons.Settings size={12} className="text-brand-purple" />
                      <h4 className="font-bold text-[10px] uppercase tracking-widest text-gray-400">Target Test Code</h4>
                    </div>
                    <Icons.HelpCircle size={12} className="text-gray-500 cursor-help" title="Input the test event code displaying in your Facebook events testing tab." />
                  </div>
                  
                  <form onSubmit={handleApply} className="flex gap-2">
                    <input
                      type="text"
                      value={testCodeInput}
                      onChange={(e) => setTestCodeInput(e.target.value)}
                      placeholder="e.g. TEST319"
                      className="flex-1 h-9 bg-black/40 border border-white/10 rounded-lg px-3 text-xs placeholder:text-gray-600 focus:outline-none focus:border-brand-primary font-mono text-white"
                    />
                    {getTestEventCode() ? (
                      <button
                        type="button"
                        onClick={handleClear}
                        className="px-3 h-9 bg-red-950 hover:bg-red-900 border border-red-900/30 text-red-300 rounded-lg text-xs font-bold transition-colors cursor-pointer bg-transparent"
                      >
                        Clear
                      </button>
                    ) : (
                      <button
                        type="submit"
                        className="px-4 h-9 bg-brand-primary hover:bg-opacity-90 rounded-lg text-xs font-extrabold transition-colors cursor-pointer uppercase tracking-wider bg-transparent border-none"
                      >
                        Set
                      </button>
                    )}
                  </form>
                  
                  <p className="mt-2 text-[9px] text-gray-400 leading-relaxed font-medium">
                    {getTestEventCode() ? (
                      <span className="text-green-400 flex items-center gap-1">
                        <Icons.Check size={10} /> Forwarding all events using testing parameter <strong>{getTestEventCode()}</strong>.
                      </span>
                    ) : (
                      "Paste the test code from your Meta Event Manager tab. This updates the URL dynamically to route all events correctly."
                    )}
                  </p>
                </div>

                <div className="flex items-center justify-between gap-2 p-2 bg-black/20 rounded-lg">
                  <span className="text-[9px] text-gray-500 font-bold font-mono truncate uppercase text-left max-w-[140px]">
                    {getTestEventCode() ? `?test_event_code=${getTestEventCode()}` : "Local Environment Mode"}
                  </span>
                  <button
                    onClick={copyTestUrl}
                    className="flex items-center gap-1.5 px-3 py-1 bg-white/5 hover:bg-white/10 border border-white/5 rounded text-[9px] font-bold transition-all cursor-pointer uppercase tracking-widest text-slate-300 bg-transparent border-none"
                  >
                    {copied ? <Icons.Check size={10} className="text-green-400" /> : <Icons.Copy size={10} />}
                    <span>{copied ? "Copied" : "Copy Shared URL"}</span>
                  </button>
                </div>

                <div className="space-y-2">
                  <div className="flex items-center justify-between">
                    <div className="flex items-center gap-1.5">
                      <Icons.Terminal size={12} className="text-brand-primary" />
                      <h4 className="font-extrabold text-[10px] uppercase tracking-widest text-gray-400">Trigger Stream ({events.length})</h4>
                    </div>
                    {events.length > 0 && (
                      <button
                        onClick={() => {
                          loggedEvents = [];
                          notifyListeners();
                          setEvents([]);
                        }}
                        className="text-[9px] text-gray-500 hover:text-white transition-colors flex items-center gap-1 cursor-pointer font-bold uppercase tracking-wider bg-transparent border-none"
                      >
                        <Icons.Trash2 size={10} /> Clear List
                      </button>
                    )}
                  </div>

                  {events.length === 0 ? (
                    <div className="text-center py-6 border border-dashed border-white/5 rounded-xl text-gray-500 text-[10px] font-bold uppercase tracking-widest leading-relaxed">
                      No active events fired yet.
                      <div className="mt-1 font-medium text-[9px] text-gray-600 normal-case">
                        Click buttons or navigate pages to view outbound packets.
                      </div>
                    </div>
                  ) : (
                    <div className="space-y-1.5 max-h-[160px] overflow-y-auto pr-0.5 no-scrollbar">
                      {events.map((evt) => {
                        const isExpanded = expandedEventId === evt.id;
                        const usedCode = evt.testCodeUsed;
                        return (
                          <div 
                            key={evt.id} 
                            className="bg-black/35 border border-white/5 rounded-lg overflow-hidden"
                          >
                            <div 
                              onClick={() => setExpandedEventId(isExpanded ? null : evt.id)}
                              className="p-2 flex items-center justify-between cursor-pointer hover:bg-white/5 transition-colors"
                            >
                              <div className="flex flex-col items-start gap-0.5 text-left">
                                <div className="flex items-center gap-1.5">
                                  <span className="font-extrabold text-[10.5px] font-mono tracking-tight text-white uppercase">
                                    {evt.name}
                                  </span>
                                  {evt.isCustom ? (
                                    <span className="bg-brand-purple/10 text-brand-purple border border-brand-purple/10 px-1 rounded text-[7.5px] font-black uppercase">
                                      Custom
                                    </span>
                                  ) : (
                                    <span className="bg-green-500/10 text-green-400 border border-green-500/10 px-1 rounded text-[7.5px] font-black uppercase">
                                      Pixel
                                    </span>
                                  )}
                                </div>
                                <span className="text-[8px] text-gray-500 font-semibold font-mono">
                                  {evt.timestamp}
                                </span>
                              </div>

                              <div className="flex items-center gap-2">
                                {usedCode && (
                                  <span className="bg-white/10 px-1.5 py-0.5 rounded text-[8px] font-mono font-bold text-gray-300">
                                    {usedCode}
                                  </span>
                                )}
                                <Icons.ChevronRight size={10} className={`text-gray-500 transition-transform ${isExpanded ? "rotate-90" : ""}`} />
                              </div>
                            </div>

                            {isExpanded && (
                              <div className="p-2.5 border-t border-white/5 bg-black/60 text-[9.5px] font-mono text-gray-300 space-y-1.5 text-left overflow-x-auto">
                                <div>
                                  <span className="text-gray-500 font-extrabold uppercase text-[8px] block tracking-wider">Params Payload:</span>
                                  <pre className="text-[9.5px] text-gray-400 whitespace-pre-wrap max-h-[85px] overflow-y-auto mt-1 p-1 bg-black/30 rounded border border-white/5">
                                    {JSON.stringify(evt.params, null, 2)}
                                  </pre>
                                </div>
                                {usedCode && (
                                  <div className="flex items-center gap-1 mt-1 text-[9px]">
                                    <span className="text-gray-500 uppercase font-extrabold text-[8px] tracking-wider">Routed test code:</span>
                                    <span className="text-brand-primary font-bold">{usedCode}</span>
                                  </div>
                                )}
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              </div>
              
              <div className="bg-white/5 border-t border-white/10 px-4 py-2.5 flex items-center justify-between text-[9px] text-gray-500 font-bold uppercase tracking-wider">
                <span>Pixel: 2813135899035813</span>
                <a 
                  href="https://business.facebook.com/events_manager2/"
                  target="_blank"
                  rel="noreferrer"
                  className="hover:text-brand-primary transition-colors flex items-center gap-0.5 text-zinc-400"
                >
                  Meta Manager <Icons.ExternalLink size={8} />
                </a>
              </div>
            </motion.div>
          </div>
        );
      }

      // --- MAIN APP COMPONENT ---
      function App() {
        return (
          <BrowserRouter>
            <PixelRouteTracker />
            <Routes>
              <Route path="/" element={<LandingPage />} />
              <Route path="/policy" element={<PolicyPage />} />
              <Route path="*" element={<LandingPage />} />
            </Routes>
            <PixelDebugger />
          </BrowserRouter>
        );
      }

      // --- RENDER APP ---
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
